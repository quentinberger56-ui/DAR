<!DOCTYPE html>

<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>EVA Joueuses</title>


<style>

body{
font-family:Arial, sans-serif;
background:#f2f2f2;
padding:15px;
}


.container{

max-width:600px;
margin:auto;
background:white;
padding:20px;
border-radius:20px;

}


h1{
text-align:center;
}


input[type=text]{

width:100%;
padding:12px;
margin-bottom:15px;
font-size:16px;

}


.question{

margin-top:30px;

}


.titre{

font-weight:bold;
line-height:1.4;

}


input[type="range"] {

    width:100%;
    height:8px;
    appearance:none;
    background:#d0d0d0;
    border-radius:10px;
    outline:none;
    margin-top:20px;

}


/* Curseur Chrome / Safari / Edge */

input[type="range"]::-webkit-slider-thumb {

    appearance:none;
    width:32px;
    height:32px;
    background:#111;
    border-radius:50%;
    cursor:pointer;
    border:3px solid white;
    box-shadow:0 2px 6px rgba(0,0,0,0.3);

}


/* Curseur Firefox */

input[type="range"]::-moz-range-thumb {

    width:32px;
    height:32px;
    background:#111;
    border-radius:50%;
    cursor:pointer;
    border:3px solid white;

}


.labels{

display:flex;
justify-content:space-between;
font-size:12px;
color:#555;

}


.valeur{

text-align:center;
font-size:22px;
font-weight:bold;

}


button{

width:100%;
padding:15px;
margin-top:30px;

background:#111;
color:white;

border:none;
border-radius:10px;

font-size:18px;

}


</style>

</head>



<body>


<div class="container">


<h1>Ressenti séance / match</h1>


<input id="nom" placeholder="Nom">

<input id="prenom" placeholder="Prénom">



<div id="questions"></div>


<button onclick="envoyer()">
Envoyer mes réponses
</button>


</div>



<script>


const URL_GOOGLE_SHEET =
"https://script.google.com/macros/s/AKfycbzBYgnAqMmHzwWEt_aK2pkZYT6IWPbXXtsgtBnJCysv95fsQdc5bSaUS1pGmiwYWaX7qg/exec";



const questions=[


["A",
"Comment as-tu perçu ta relation avec le ballon ?",
"Excellente",
"Extrêmement difficile"
],


["B",
"As-tu eu le sentiment de percevoir le jeu avec clarté, fluidité, précision et rapidité ?",
"Tout à fait",
"Pas du tout"
],


["C",
"As-tu réussi à résoudre les problèmes posés par le jeu ?",
"tout à fait",
"Pas du tout"
],


["D",
"À quel point la séance/match t'a-t-elle semblé difficile ?",
"Extrêmement facile",
"Effort insoutenable"
],


["E",
"Comment as-tu perçu ta capacité à enchaîner les efforts ?",
"Excellente",
"Extrêmement mauvaise"
],


["F",
"As-tu ressenti du plaisir au cours de la séance/match ?",
"Maximal",
"Aucun"
],


["G",
"À quel point as-tu trouvé du sens dans cet entraînement/match ?",
"Maximal",
"Aucun"
],


["H",
"Comment as-tu perçu ton niveau de concentration ?",
"Excellent",
"Extrêmement mauvais"

]


];



let reponses={};



let zone=document.getElementById("questions");



questions.forEach(q=>{


zone.innerHTML += `

<div class="question">


<div class="titre">
${q[0]} - ${q[1]}
</div>


<input 
type="range"
id="${q[0]}"
min="0"
max="10"
step="0.1"
value="5"
>


<div class="labels">

<div>
<strong>0</strong><br>
${q[2]}
</div>


<div style="text-align:right">

<strong>10</strong><br>
${q[3]}

</div>

</div>





</div>

`;



});



questions.forEach(q=>{


slider.oninput=function(){

reponses[q[0]]=this.value;

};


});




function envoyer(){



reponses.nom=document.getElementById("nom").value;

reponses.prenom=document.getElementById("prenom").value;



fetch(URL_GOOGLE_SHEET,{

method:"POST",

body:JSON.stringify(reponses)

})


.then(()=>{

alert("Merci pour ton retour !");

location.reload();

});


}



</script>


</body>

</html>
